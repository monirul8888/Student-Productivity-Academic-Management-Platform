services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: studyflow
      POSTGRES_PASSWORD: studyflow123
      POSTGRES_DB: studyflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyflow -d studyflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://studyflow:studyflow123@db:5432/studyflow_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: